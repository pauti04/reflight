# docker compose up → API on :8724, timeline UI on :3000.
# Ports busy? REFLIGHT_UI_PORT=3100 REFLIGHT_API_PORT=8725 docker compose up
# Record runs on the host (they land in ./runs); the API serves them read-only.
services:
  api:
    build: .
    ports:
      - "${REFLIGHT_API_PORT:-8724}:8724"
    volumes:
      - ./runs:/app/runs

  ui:
    build:
      context: ./ui
      args:
        NEXT_PUBLIC_REFLIGHT_API: http://localhost:${REFLIGHT_API_PORT:-8724}
    ports:
      - "${REFLIGHT_UI_PORT:-3000}:3000"
    depends_on:
      - api
